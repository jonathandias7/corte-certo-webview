name: Build AAB (Final)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 🔥 INSTALA ANDROID SDK CORRETAMENTE
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK 35 limpo
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update

          sdkmanager --uninstall "platforms;android-35" || true
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"
          sdkmanager "platform-tools"

      - name: Instalar Gradle moderno
        run: |
          wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
          unzip gradle-7.5-bin.zip
          echo "$PWD/gradle-7.5/bin" >> $GITHUB_PATH

      - name: Gerar Gradle Wrapper
        run: gradle wrapper --gradle-version 7.5

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

      - name: Limpar cache do Gradle
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/

      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build AAB
        run: |
          ./gradlew clean
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: corte-certo-aab
          path: app/build/outputs/bundle/release/app-release.aab
