name: Build AAB (Final)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # BAIXAR PROJETO
      # ------------------------------------------------------------
      - name: Checkout código
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # JAVA 17
      # ------------------------------------------------------------
      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ------------------------------------------------------------
      # INSTALAR ANDROID SDK
      # ------------------------------------------------------------
      - name: Instalar Android SDK manual
        run: |
          export ANDROID_HOME=$HOME/android-sdk

          mkdir -p "$ANDROID_HOME/cmdline-tools"

          cd "$ANDROID_HOME/cmdline-tools"

          wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O tools.zip

          unzip tools.zip

          mv cmdline-tools latest

          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"

          yes | sdkmanager --licenses

          sdkmanager "platform-tools"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "build-tools;35.0.0"
          sdkmanager "platforms;android-35"

      # ------------------------------------------------------------
      # REMOVER SDK ANTIGO DO RUNNER
      # ------------------------------------------------------------
      - name: Remover SDK antigo
        run: |
          sudo rm -rf /usr/local/lib/android/sdk || true

      # ------------------------------------------------------------
      # CONFIGURAR VARIÁVEIS DO SDK
      # ------------------------------------------------------------
      - name: Configurar variáveis do Android SDK
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "$HOME/android-sdk/platform-tools" >> "$GITHUB_PATH"

      # ------------------------------------------------------------
      # INSTALAR GRADLE 8.7
      # ------------------------------------------------------------
      - name: Instalar Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip

          unzip gradle-8.7-bin.zip

          echo "$PWD/gradle-8.
